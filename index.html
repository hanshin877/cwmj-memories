<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찬우 & 민재의 캘린더 📅</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --cw: #4AABFF; --cw-light: #E8F5FF; --cw-mid: #A8D8FF;
    --mj: #FF7FA0; --mj-light: #FFF0F4; --mj-mid: #FFB7C8;
    --both: #A066FF; --both-light: #F3EEFF; --both-mid: #CAAEFF;
    --bg: #FFF8FB; --text: #444; --text-light: #888;
    --radius: 16px; --shadow: 0 4px 20px rgba(180,100,150,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nanum Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 헤더 ── */
  header {
    background: linear-gradient(135deg, #FFB7D0, #B3DAFF);
    text-align: center; padding: 22px 20px 18px;
    box-shadow: 0 3px 15px rgba(160,100,180,0.18);
  }
  .site-title { font-family: 'Nanum Pen Script', cursive; font-size: clamp(2rem,6vw,2.8rem); color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .site-subtitle { font-size: .82rem; color: rgba(255,255,255,0.92); margin-top: 4px; font-weight: 700; }
  .legend { display: flex; justify-content: center; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: .75rem; font-weight: 700; color: white; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* ── 캘린더 컨트롤 ── */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 780px; margin: 24px auto 0; padding: 0 16px;
  }
  .cal-nav-btn {
    background: white; border: 2px solid var(--mj-mid); color: var(--mj);
    border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s; box-shadow: var(--shadow);
  }
  .cal-nav-btn:hover { background: var(--mj); color: white; }
  .cal-month-title { font-family: 'Nanum Pen Script', cursive; font-size: clamp(1.4rem,4vw,1.9rem); color: #c04070; text-align: center; }
  .today-btn {
    background: linear-gradient(135deg, var(--mj), var(--cw));
    color: white; border: none; border-radius: 20px; padding: 6px 14px;
    font-size: .75rem; font-weight: 800; cursor: pointer; transition: opacity .2s;
    font-family: 'Nanum Gothic', sans-serif;
  }
  .today-btn:hover { opacity: .85; }

  /* ── 캘린더 그리드 ── */
  .cal-wrap { max-width: 780px; margin: 14px auto 0; padding: 0 16px; }
  .cal-grid { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .cal-header-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: linear-gradient(135deg, #FFB7D0, #B3DAFF);
  }
  .cal-header-cell {
    text-align: center; padding: 10px 4px; font-size: .72rem;
    font-weight: 800; color: white;
  }
  .cal-header-cell:first-child { color: #FF9090; }
  .cal-header-cell:last-child { color: #90C8FF; }
  .cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell {
    min-height: 80px; border: 1px solid #F0E8F0; padding: 6px 5px 4px;
    cursor: pointer; transition: background .15s; position: relative;
    display: flex; flex-direction: column;
  }
  .cal-cell:hover { background: #FFF5F8; }
  .cal-cell.other-month { background: #FAF7FB; }
  .cal-cell.other-month .cal-day-num { color: #CCC; }
  .cal-cell.today { background: linear-gradient(135deg, #FFF0F4, #EFF7FF); }
  .cal-cell.today .cal-day-num {
    background: linear-gradient(135deg, var(--mj), var(--cw));
    color: white; border-radius: 50%; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center; font-size: .75rem;
  }
  .cal-day-num { font-size: .78rem; font-weight: 800; color: var(--text); margin-bottom: 3px; line-height: 1; }
  .cal-cell:nth-child(7n+1) .cal-day-num { color: #E05050; }
  .cal-cell:nth-child(7n) .cal-day-num { color: #5090E0; }
  .cal-cell.today .cal-day-num { color: white !important; }
  .cal-event-tags { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .cal-event-tag {
    font-size: .62rem; font-weight: 700; padding: 2px 5px; border-radius: 8px;
    line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tag-cw { background: var(--cw-light); color: var(--cw); }
  .tag-mj { background: var(--mj-light); color: var(--mj); }
  .tag-both { background: var(--both-light); color: var(--both); }

  /* ── 상세 패널 ── */
  .detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 500;
    align-items: center; justify-content: center; padding: 16px;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: white; border-radius: 20px; max-width: 560px; width: 100%;
    max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    position: relative;
  }
  .detail-header {
    padding: 16px 16px 12px;
    border-bottom: 2px solid #FFF0F4;
    position: sticky; top: 0; background: white; z-index: 10;
    border-radius: 20px 20px 0 0;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .detail-date { font-family: 'Nanum Pen Script', cursive; font-size: 1.4rem; color: #c04070; }
  .detail-header-btns { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .add-event-btn {
    background: linear-gradient(135deg, var(--mj), var(--cw));
    color: white; border: none; border-radius: 16px;
    padding: 6px 13px; font-size: .72rem; font-weight: 800;
    cursor: pointer; font-family: 'Nanum Gothic', sans-serif;
    transition: opacity .2s; white-space: nowrap;
  }
  .add-event-btn:hover { opacity: .85; }
  .detail-close {
    width: 30px; height: 30px; background: #F5F0F5; border: none;
    border-radius: 50%; cursor: pointer; font-size: .85rem; color: #888;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
    flex-shrink: 0;
  }
  .detail-close:hover { background: var(--mj); color: white; }
  .detail-body { padding: 14px 16px 18px; }

  /* ── 일정 추가 폼 ── */
  .add-form-wrap {
    margin: 0 16px 0; padding: 16px;
    background: #FFF8FB; border-radius: 14px;
    border: 2px dashed var(--mj-mid);
  }
  .add-form-label {
    font-size: .8rem; font-weight: 800; color: #c04070; margin-bottom: 12px;
    display: flex; align-items: center; gap: 5px;
  }
  .who-selector { display: flex; gap: 7px; margin-bottom: 10px; }
  .who-btn {
    flex: 1; padding: 8px 4px; border-radius: 10px; border: 2px solid;
    font-size: .74rem; font-weight: 800; cursor: pointer;
    font-family: 'Nanum Gothic', sans-serif; transition: all .2s;
    background: white;
  }
  .who-btn[data-who="cw"] { border-color: var(--cw); color: var(--cw); }
  .who-btn[data-who="mj"] { border-color: var(--mj); color: var(--mj); }
  .who-btn[data-who="both"] { border-color: var(--both); color: var(--both); }
  .who-btn.selected[data-who="cw"] { background: var(--cw); color: white; }
  .who-btn.selected[data-who="mj"] { background: var(--mj); color: white; }
  .who-btn.selected[data-who="both"] { background: var(--both); color: white; }
  .form-input {
    width: 100%; padding: 9px 12px; border: 2px solid #EEE;
    border-radius: 10px; font-size: .83rem; font-family: 'Nanum Gothic', sans-serif;
    color: var(--text); margin-bottom: 8px; outline: none; transition: border-color .2s;
    display: block;
  }
  .form-input:focus { border-color: var(--mj); }
  .form-textarea { resize: vertical; min-height: 76px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  .form-cancel-btn {
    background: #F0EEF0; color: #888; border: none; border-radius: 12px;
    padding: 7px 14px; font-size: .77rem; font-weight: 800;
    cursor: pointer; font-family: 'Nanum Gothic', sans-serif;
  }
  .form-save-btn {
    background: linear-gradient(135deg, var(--mj), var(--cw));
    color: white; border: none; border-radius: 12px;
    padding: 7px 18px; font-size: .77rem; font-weight: 800;
    cursor: pointer; font-family: 'Nanum Gothic', sans-serif;
  }
  .form-save-btn:active { opacity: .85; }
  .form-input.error { border-color: #FF5050; }

  /* ── 이벤트 카드 ── */
  .detail-event {
    margin-bottom: 12px; padding: 14px; border-radius: 14px; border-left: 4px solid;
  }
  .detail-event.ev-cw { background: var(--cw-light); border-color: var(--cw); }
  .detail-event.ev-mj { background: var(--mj-light); border-color: var(--mj); }
  .detail-event.ev-both { background: var(--both-light); border-color: var(--both); }
  .detail-ev-who {
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px; margin-bottom: 7px;
  }
  .who-badge {
    padding: 2px 10px; border-radius: 10px; color: white; font-size: .68rem; font-weight: 800;
  }
  .badge-cw { background: var(--cw); }
  .badge-mj { background: var(--mj); }
  .badge-both { background: var(--both); }
  .ev-delete-btn {
    background: none; border: none; cursor: pointer; color: #CCC;
    font-size: .78rem; padding: 3px 7px; border-radius: 8px; transition: all .2s; line-height: 1;
  }
  .ev-delete-btn:hover { background: #FFE8E8; color: #E05050; }
  .detail-ev-title { font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 5px; }
  .detail-ev-desc { font-size: .82rem; color: var(--text-light); line-height: 1.7; white-space: pre-wrap; }
  .detail-gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px; margin-top: 10px;
  }
  .detail-gallery img {
    width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px;
    cursor: pointer; transition: transform .15s;
  }
  .detail-gallery img:hover { transform: scale(1.04); }
  .no-event-msg {
    text-align: center; color: var(--text-light); padding: 28px 20px; font-size: .88rem; line-height: 1.8;
  }

  /* ── 라이트박스 ── */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 10px; object-fit: contain; }
  .lb-close {
    position: absolute; top: 16px; right: 20px; color: white;
    background: rgba(255,255,255,0.15); border: none; border-radius: 20px;
    padding: 4px 16px; font-size: 1rem; cursor: pointer;
  }
  .lb-prev, .lb-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.18); color: white; border: none;
    width: 46px; height: 46px; border-radius: 50%; font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .lb-prev { left: 12px; } .lb-next { right: 12px; }
  .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.32); }

  /* ── 반응형 ── */
  @media(max-width: 540px) {
    .cal-cell { min-height: 58px; padding: 4px 3px 3px; }
    .cal-event-tag { font-size: .56rem; padding: 1px 3px; }
    .cal-day-num { font-size: .7rem; }
    .add-form-wrap { margin: 0 12px; }
    .detail-header { padding: 13px 13px 10px; }
    .detail-body { padding: 12px 13px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="site-title">찬우 &amp; 민재의 캘린더 📅</div>
  <div class="site-subtitle">두 아이의 소중한 일정과 추억을 함께</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--cw)"></div>찬우</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--mj)"></div>민재</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--both)"></div>찬우+민재</div>
  </div>
</header>

<div class="cal-nav">
  <button class="cal-nav-btn" id="prevBtn">‹</button>
  <div>
    <div class="cal-month-title" id="monthTitle"></div>
  </div>
  <button class="cal-nav-btn" id="nextBtn">›</button>
</div>
<div style="text-align:center;margin:8px 0 0;">
  <button class="today-btn" id="todayBtn">오늘</button>
</div>

<div class="cal-wrap">
  <div class="cal-grid">
    <div class="cal-header-row">
      <div class="cal-header-cell">일</div>
      <div class="cal-header-cell">월</div>
      <div class="cal-header-cell">화</div>
      <div class="cal-header-cell">수</div>
      <div class="cal-header-cell">목</div>
      <div class="cal-header-cell">금</div>
      <div class="cal-header-cell">토</div>
    </div>
    <div class="cal-body" id="calBody"></div>
  </div>
</div>

<!-- 상세 패널 -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-date" id="detailDate"></div>
      <div class="detail-header-btns">
        <button class="add-event-btn" id="addEventBtn">+ 일정 추가</button>
        <button class="detail-close" id="detailClose">✕</button>
      </div>
    </div>

    <!-- 일정 추가 폼 -->
    <div class="add-form-wrap" id="addFormWrap" style="display:none;margin-top:14px;">
      <div class="add-form-label">📝 새 일정 등록</div>
      <div class="who-selector">
        <button class="who-btn selected" data-who="cw" onclick="selectWho(this)">찬우</button>
        <button class="who-btn" data-who="mj" onclick="selectWho(this)">민재</button>
        <button class="who-btn" data-who="both" onclick="selectWho(this)">찬우+민재</button>
      </div>
      <input class="form-input" id="formTitle" type="text" placeholder="제목 (필수)" maxlength="50">
      <textarea class="form-input form-textarea" id="formDesc" placeholder="내용 (선택)" maxlength="500"></textarea>
      <div class="form-actions">
        <button class="form-cancel-btn" onclick="hideAddForm()">취소</button>
        <button class="form-save-btn" onclick="submitForm()">저장</button>
      </div>
    </div>

    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- 라이트박스 -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLb()">닫기 ✕</button>
  <button class="lb-prev" onclick="moveLb(-1)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" onclick="moveLb(1)">›</button>
</div>

<script>
// ── 이벤트 데이터 (build_cwmj.py 가 갱신) ────────────────────────────
const EVENTS = [
];

// ── 로컬 이벤트 (localStorage) ────────────────────────────────────────
function getLocalEvents() {
  try { return JSON.parse(localStorage.getItem('cwmj_events') || '[]'); }
  catch { return []; }
}
function saveLocalEvents(arr) {
  localStorage.setItem('cwmj_events', JSON.stringify(arr));
}
function allEvents() {
  return [...EVENTS, ...getLocalEvents()];
}

// ── HTML 이스케이프 ───────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── 캘린더 렌더링 ─────────────────────────────────────────────────────
let curYear, curMonth;
const today = new Date();

function init() {
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthTitle').textContent = `${curYear}년 ${monthNames[curMonth]}`;

  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const lastDate = new Date(curYear, curMonth + 1, 0).getDate();
  const prevLastDate = new Date(curYear, curMonth, 0).getDate();
  const merged = allEvents();

  const body = document.getElementById('calBody');
  body.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const d = prevLastDate - firstDay + 1 + i;
    body.innerHTML += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvents = merged.filter(e => e.date === dateStr);
    const isToday = (curYear === today.getFullYear() && curMonth === today.getMonth() && d === today.getDate());

    // 태그: 최대 3개 표시 (넘으면 +N)
    let tags = '';
    const shown = dayEvents.slice(0, 3);
    shown.forEach(e => {
      const cls = e.who === 'cw' ? 'tag-cw' : e.who === 'mj' ? 'tag-mj' : 'tag-both';
      const label = esc(e.title) || (e.who === 'cw' ? '찬우' : e.who === 'mj' ? '민재' : '공통');
      tags += `<div class="cal-event-tag ${cls}">${label}</div>`;
    });
    if (dayEvents.length > 3) {
      tags += `<div class="cal-event-tag" style="background:#EEE;color:#999">+${dayEvents.length - 3}개</div>`;
    }

    const classes = ['cal-cell', isToday ? 'today' : '', dayEvents.length ? 'has-event' : ''].filter(Boolean).join(' ');
    body.innerHTML += `<div class="${classes}" onclick="openDetail('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      <div class="cal-event-tags">${tags}</div>
    </div>`;
  }

  const totalCells = firstDay + lastDate;
  const remain = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remain; i++) {
    body.innerHTML += `<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  }
}

document.getElementById('prevBtn').onclick = () => {
  curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; } renderCalendar();
};
document.getElementById('nextBtn').onclick = () => {
  curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; } renderCalendar();
};
document.getElementById('todayBtn').onclick = () => {
  curYear = today.getFullYear(); curMonth = today.getMonth(); renderCalendar();
};

// ── 상세 패널 ─────────────────────────────────────────────────────────
const WEEK = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const WHO_LABEL = { cw: '찬우', mj: '민재', both: '찬우 + 민재' };
let currentDateStr = '';
let lbPhotos = [], lbPhotoIdx = 0;

function openDetail(dateStr) {
  currentDateStr = dateStr;
  hideAddForm();

  const [y, m, d] = dateStr.split('-');
  const dt = new Date(+y, +m-1, +d);
  document.getElementById('detailDate').textContent = `${y}년 ${+m}월 ${+d}일 (${WEEK[dt.getDay()]})`;

  renderDetailBody(dateStr);
  document.getElementById('detailOverlay').classList.add('open');
}

function renderDetailBody(dateStr) {
  const dayEvents = allEvents().filter(e => e.date === dateStr);
  const body = document.getElementById('detailBody');

  if (!dayEvents.length) {
    body.innerHTML = `<div class="no-event-msg">📭 이 날의 일정이 없습니다<br>
      <span style="font-size:.75rem;opacity:.65">위의 "+ 일정 추가" 버튼으로 등록하세요</span></div>`;
    return;
  }

  lbPhotos = [];
  body.innerHTML = dayEvents.map((e) => {
    const evCls = `ev-${e.who}`;
    const badge = `<span class="who-badge badge-${e.who}">${WHO_LABEL[e.who]}</span>`;
    const deleteBtn = e.local
      ? `<button class="ev-delete-btn" onclick="deleteLocalEvent('${esc(e.id)}')" title="삭제">🗑</button>`
      : '';

    const photosBefore = lbPhotos.length;
    (e.photos || []).forEach(src => lbPhotos.push(src));
    const galleryHtml = (e.photos || []).map((src, pi) =>
      `<img src="${src}" alt="사진" onclick="openLb(${photosBefore + pi})" loading="lazy">`
    ).join('');
    const gallery = galleryHtml ? `<div class="detail-gallery">${galleryHtml}</div>` : '';

    const descHtml = e.desc
      ? `<div class="detail-ev-desc">${esc(e.desc)}</div>`
      : '';

    return `<div class="detail-event ${evCls}">
      <div class="detail-ev-who">${badge}${deleteBtn}</div>
      <div class="detail-ev-title">${esc(e.title)}</div>
      ${descHtml}
      ${gallery}
    </div>`;
  }).join('');
}

document.getElementById('detailClose').onclick = closeDetail;
document.getElementById('detailOverlay').onclick = e => {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
};
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  hideAddForm();
}

// ── 일정 추가 폼 ─────────────────────────────────────────────────────
let selectedWho = 'cw';

document.getElementById('addEventBtn').onclick = () => {
  const wrap = document.getElementById('addFormWrap');
  if (wrap.style.display === 'none') {
    showAddForm();
  } else {
    hideAddForm();
  }
};

function showAddForm() {
  selectedWho = 'cw';
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.who-btn[data-who="cw"]').classList.add('selected');
  document.getElementById('formTitle').value = '';
  document.getElementById('formTitle').classList.remove('error');
  document.getElementById('formDesc').value = '';
  document.getElementById('addFormWrap').style.display = '';
  // 폼으로 스크롤
  document.getElementById('addFormWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  setTimeout(() => document.getElementById('formTitle').focus(), 200);
}

function hideAddForm() {
  document.getElementById('addFormWrap').style.display = 'none';
}

function selectWho(btn) {
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedWho = btn.getAttribute('data-who');
}

function submitForm() {
  const titleEl = document.getElementById('formTitle');
  const title = titleEl.value.trim();
  if (!title) {
    titleEl.classList.add('error');
    titleEl.focus();
    titleEl.placeholder = '제목을 입력해주세요!';
    return;
  }
  titleEl.classList.remove('error');

  const desc = document.getElementById('formDesc').value.trim();
  const arr = getLocalEvents();
  arr.push({
    id: Date.now().toString(),
    date: currentDateStr,
    who: selectedWho,
    title,
    desc,
    local: true
  });
  saveLocalEvents(arr);

  hideAddForm();
  renderCalendar();
  renderDetailBody(currentDateStr);
}

function deleteLocalEvent(id) {
  if (!confirm('이 일정을 삭제할까요?')) return;
  const arr = getLocalEvents().filter(e => e.id !== id);
  saveLocalEvents(arr);
  renderCalendar();
  renderDetailBody(currentDateStr);
}

// Enter 키로 저장
document.getElementById('formTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitForm();
});

// ── 라이트박스 ────────────────────────────────────────────────────────
function openLb(idx) {
  lbPhotoIdx = idx;
  document.getElementById('lbImg').src = lbPhotos[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLb() { document.getElementById('lightbox').classList.remove('open'); }
function moveLb(dir) {
  lbPhotoIdx = (lbPhotoIdx + dir + lbPhotos.length) % lbPhotos.length;
  document.getElementById('lbImg').src = lbPhotos[lbPhotoIdx];
}

document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'ArrowLeft') moveLb(-1);
    else if (e.key === 'ArrowRight') moveLb(1);
    else if (e.key === 'Escape') closeLb();
  } else if (e.key === 'Escape') closeDetail();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLb();
});

init();
</script>
